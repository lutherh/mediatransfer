services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mediatransfer-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    command: sh -c "npm run db:push && npm run start"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      API_AUTH_TOKEN: ${API_AUTH_TOKEN}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-mediatransfer}:${POSTGRES_PASSWORD:-mediatransfer}@postgres:5432/${POSTGRES_DB:-mediatransfer}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET:-change-me-to-a-random-secret}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: mediatransfer-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mediatransfer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediatransfer}
      POSTGRES_DB: ${POSTGRES_DB:-mediatransfer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mediatransfer}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mediatransfer-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
