# Immich — Self-hosted photo backup for iOS devices
#
# Start:  docker compose -f docker-compose.immich.yml up -d
# Stop:   docker compose -f docker-compose.immich.yml down
#
# Then open http://localhost:2283 to create your admin account.
# S3 originals are mounted via an rclone sidecar container into a shared volume.
# On each iPhone, install the Immich app and point it to http://<your-pc-ip>:2283

services:
  # Clean up stale FUSE mounts left by a crashed rclone-s3 container.
  # Without this, Docker gets "transport endpoint is not connected" on the
  # bind-mount path and refuses to start rclone-s3 after an unclean shutdown.
  rclone-cleanup:
    image: alpine:3.19
    container_name: immich_rclone_cleanup
    restart: "no"
    privileged: true
    pid: host
    entrypoint: ["nsenter", "-t", "1", "-m", "--", "sh", "-c"]
    command:
      - |
        # Find and lazy-unmount any stale rclone FUSE mounts
        stale=$$(mount | grep 'fuse.rclone' | awk '{print $$3}')
        if [ -n "$$stale" ]; then
          echo "[rclone-cleanup] Cleaning stale FUSE mounts..."
          echo "$$stale" | while read -r mp; do
            echo "  umount -l $$mp"
            umount -l "$$mp" 2>/dev/null || true
          done
        else
          echo "[rclone-cleanup] No stale mounts found"
        fi

  rclone-s3:
    image: rclone/rclone:latest
    container_name: immich_rclone_s3
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    devices:
      - /dev/fuse
    entrypoint: /bin/sh
    stop_grace_period: 30s
    command:
      - -c
      - |
        cleanup() { fusermount -uz /mnt/s3 2>/dev/null; exit 0; }
        trap cleanup TERM INT
        mkdir -p /mnt/s3 &&
        fusermount -uz /mnt/s3 2>/dev/null || true &&
        # Trailing slash on the remote path is REQUIRED for Scaleway. Without it
        # rclone probes the prefix via HeadObject, and Scaleway returns 403
        # (not 404) for non-existent keys, causing the mount to fail.
        rclone mount ":s3:$${RCLONE_BUCKET}/$${RCLONE_PREFIX:-immich}/" /mnt/s3 \
          --s3-provider Scaleway \
          --s3-access-key-id "$$SCW_ACCESS_KEY" \
          --s3-secret-access-key "$$SCW_SECRET_KEY" \
          --s3-endpoint "https://s3.$${SCW_REGION:-nl-ams}.scw.cloud" \
          --s3-region "$${SCW_REGION:-nl-ams}" \
          --vfs-cache-mode full \
          --vfs-cache-max-size 10G \
          --vfs-cache-max-age 72h \
          --vfs-read-chunk-size 16M \
          --vfs-read-chunk-size-limit 64M \
          --dir-cache-time 5m \
          --transfers 8 \
          --allow-other \
          --allow-non-empty \
          --log-level NOTICE &
        wait $!
    env_file:
      - .env
      - .env.immich
    volumes:
      # Host bind with `rshared` propagation is required so rclone's FUSE
      # mount inside this container becomes visible to immich-server.
      # Stale endpoints after an unclean shutdown are handled by the
      # rclone-cleanup sidecar + the write-based healthcheck below.
      - ./data/s3-mount:/mnt/s3:rshared
    depends_on:
      rclone-cleanup:
        condition: service_completed_successfully
    healthcheck:
      # `ls` succeeds even on a dead FUSE mount (returns empty). A touch/rm on
      # a sentinel file forces a real syscall round-trip through rclone and
      # fails fast when the mount is broken — Docker then restarts the container.
      test: ["CMD-SHELL", "touch /mnt/s3/.healthcheck && rm -f /mnt/s3/.healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 45s

  immich-init:
    image: busybox:latest
    container_name: immich_init
    restart: "no"
    volumes:
      - ${UPLOAD_LOCATION:-./data/immich}:/upload
      - ${THUMB_LOCATION:-./data/immich/thumbs}:/upload/thumbs
      - ${ENCODED_VIDEO_LOCATION:-./data/immich/encoded-video}:/upload/encoded-video
      - ${PROFILE_LOCATION:-./data/immich/profile}:/upload/profile
      - ${BACKUP_LOCATION:-./data/immich/backups}:/upload/backups
    entrypoint: /bin/sh
    command: >
      -c "for d in encoded-video thumbs upload library profile backups; do
        mkdir -p /upload/$$d && touch /upload/$$d/.immich;
      done"

  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich_server
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "127.0.0.1:2283:2283"
    volumes:
      - ${UPLOAD_LOCATION:-./data/immich}:/usr/src/app/upload
      - ${THUMB_LOCATION:-./data/immich/thumbs}:/usr/src/app/upload/thumbs
      - ${ENCODED_VIDEO_LOCATION:-./data/immich/encoded-video}:/usr/src/app/upload/encoded-video
      - ${PROFILE_LOCATION:-./data/immich/profile}:/usr/src/app/upload/profile
      - ${BACKUP_LOCATION:-./data/immich/backups}:/usr/src/app/upload/backups
      - ./data/s3-mount:/usr/src/app/upload/s3transfers:ro,rslave
    env_file:
      - .env.immich
    depends_on:
      immich-init:
        condition: service_completed_successfully
      rclone-s3:
        condition: service_healthy
      database:
        condition: service_healthy
      immich-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:2283/api/server/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich_machine_learning
    restart: unless-stopped
    depends_on:
      immich-redis:
        condition: service_healthy
    volumes:
      - immich-model-cache:/cache
    env_file:
      - .env.immich
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3003/ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  database:
    image: ghcr.io/tensorchord/pgvecto-rs:pg16-v0.3.0
    container_name: immich_postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-immich}
      POSTGRES_USER: ${DB_USERNAME:-immich}
      POSTGRES_DB: ${DB_DATABASE_NAME:-immich}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - immich-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${DB_DATABASE_NAME:-immich} -U ${DB_USERNAME:-immich}"]
      interval: 5s
      timeout: 5s
      retries: 5

  immich-redis:
    image: redis:7-alpine
    container_name: immich_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  immich-pgdata:
  immich-model-cache:
