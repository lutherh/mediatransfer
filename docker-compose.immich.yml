# Immich — Self-hosted photo backup for iOS devices
#
# Start:  docker compose -f docker-compose.immich.yml up -d
# Stop:   docker compose -f docker-compose.immich.yml down
#
# Then open http://localhost:2283 to create your admin account.
# S3 originals are mounted via an rclone sidecar container into a shared volume.
# On each iPhone, install the Immich app and point it to http://<your-pc-ip>:2283

services:
  rclone-s3:
    image: rclone/rclone:latest
    container_name: immich_rclone_s3
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    devices:
      - /dev/fuse
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mkdir -p /mnt/s3 &&
        fusermount -uz /mnt/s3 2>/dev/null || true &&
        exec rclone mount ":s3:$${RCLONE_BUCKET}/$${RCLONE_PREFIX:-immich}" /mnt/s3 \
          --s3-provider Scaleway \
          --s3-access-key-id "$$SCW_ACCESS_KEY" \
          --s3-secret-access-key "$$SCW_SECRET_KEY" \
          --s3-endpoint "https://s3.$${SCW_REGION:-nl-ams}.scw.cloud" \
          --s3-region "$${SCW_REGION:-nl-ams}" \
          --vfs-cache-mode full \
          --vfs-cache-max-size 10G \
          --vfs-cache-max-age 72h \
          --vfs-read-chunk-size 16M \
          --vfs-read-chunk-size-limit 64M \
          --dir-cache-time 5m \
          --transfers 8 \
          --allow-other \
          --allow-non-empty \
          --log-level NOTICE
    env_file:
      - .env
      - .env.immich
    volumes:
      - ./data/s3-mount:/mnt/s3:rshared
    healthcheck:
      test: ["CMD", "ls", "/mnt/s3"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  immich-init:
    image: busybox:latest
    container_name: immich_init
    restart: "no"
    volumes:
      - ${UPLOAD_LOCATION:-./data/immich}:/upload
      - ${THUMB_LOCATION:-./data/immich/thumbs}:/upload/thumbs
      - ${ENCODED_VIDEO_LOCATION:-./data/immich/encoded-video}:/upload/encoded-video
      - ${PROFILE_LOCATION:-./data/immich/profile}:/upload/profile
      - ${BACKUP_LOCATION:-./data/immich/backups}:/upload/backups
    entrypoint: /bin/sh
    command: >
      -c "for d in encoded-video thumbs upload library profile backups; do
        mkdir -p /upload/$$d && touch /upload/$$d/.immich;
      done"

  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich_server
    restart: unless-stopped
    ports:
      - "2283:2283"
    volumes:
      - ${UPLOAD_LOCATION:-./data/immich}:/usr/src/app/upload
      - ${THUMB_LOCATION:-./data/immich/thumbs}:/usr/src/app/upload/thumbs
      - ${ENCODED_VIDEO_LOCATION:-./data/immich/encoded-video}:/usr/src/app/upload/encoded-video
      - ${PROFILE_LOCATION:-./data/immich/profile}:/usr/src/app/upload/profile
      - ${BACKUP_LOCATION:-./data/immich/backups}:/usr/src/app/upload/backups
      - ./data/s3-mount:/usr/src/app/upload/s3transfers:ro,slave
    env_file:
      - .env.immich
    depends_on:
      immich-init:
        condition: service_completed_successfully
      rclone-s3:
        condition: service_healthy
      database:
        condition: service_healthy
      redis:
        condition: service_healthy

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich_machine_learning
    restart: unless-stopped
    volumes:
      - immich-model-cache:/cache
    env_file:
      - .env.immich

  database:
    image: ghcr.io/tensorchord/pgvecto-rs:pg16-v0.3.0
    container_name: immich_postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-immich}
      POSTGRES_USER: ${DB_USERNAME:-immich}
      POSTGRES_DB: ${DB_DATABASE_NAME:-immich}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - immich-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${DB_DATABASE_NAME:-immich} -U ${DB_USERNAME:-immich}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: immich_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  immich-pgdata:
  immich-model-cache:
